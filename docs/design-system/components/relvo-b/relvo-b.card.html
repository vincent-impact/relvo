<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-body); background: #d6d4d0; padding: 18px; }
  .frame { width: 404px; border-radius: 30px; overflow: hidden; background: #fff; box-shadow: 0 20px 50px rgba(20,18,30,.28); }
  .scrollarea { background: var(--bg-secondary); padding-bottom: 8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const NS = window.RelvoDesignSystem_ad3a3c;
  const { RelvoHeader, MetricsCard, SegTabs, SubjectRow, RecipientComposer, GlassTabBar } = NS;
  const box = (p) => <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M3 8 12 3l9 5v8l-9 5-9-5z"/><path d="M3 8l9 5 9-5M12 13v8"/></svg>;
  function Demo() {
    const [tab, setTab] = React.useState("priorite");
    return (
      <div className="frame">
        <RelvoHeader title="Mon fil" subtitle="18 sujets · triés par Relvo" paddingBottom={40}
          logoSrc="../../assets/relvo-icon-256.png">
          <div style={{ padding: "16px 22px 0" }}>
            <MetricsCard overlap={false} metrics={[
              { value: 1, label: "Urgents", tone: "urgent" },
              { value: 3, label: "Tâches" },
              { value: 1, label: "RDV" },
              { type: "gauge", percent: 64, label: "Saturation" },
            ]} />
          </div>
        </RelvoHeader>

        <div style={{ margin: "0 16px" }}>
          <SegTabs overlap value={tab} onChange={setTab} tabs={[
            { key: "priorite", label: "Priorité", count: 3 },
            { key: "ouverts", label: "Ouverts", count: 13 },
            { key: "termines", label: "Terminés", count: 5 },
          ]} />
        </div>

        <div className="scrollarea" style={{ paddingTop: 8 }}>
          <SubjectRow reference="SUB-0142" urgent unread={2} icon={box()} railColor="var(--blue-600)"
            title="Remplacement sauce blanche"
            summary="Karim propose une substitution. Réponse et 2 tâches prêtes."
            tags={[{ label: "À faire · 2", tone: "amber" }, { label: "✦ 2 suggérées", tone: "relvo" }]} />
          <SubjectRow reference="SUB-0098" railColor="var(--purple-600)" icon={box()}
            title="Congé maternité — Sophie" summary="Dossier RH rassemblé, courrier préparé."
            tags={[{ label: "✦ 1 suggérée", tone: "relvo" }]} />
        </div>

        <RecipientComposer recipients={[
          { key: "karim", name: "Karim", kind: "human", initials: "KB", sublabel: "SoGood · WhatsApp" },
          { key: "relvo", name: "Relvo", kind: "relvo", sublabel: "Votre assistant" },
        ]} defaultValue="karim" />
        <GlassTabBar value="fil" />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
